interface:
  display_name: "Maintainer Orchestrator"
  short_description: "Delegate repo work and prepare mergeable queues"
  default_prompt: "Use $maintainer-orchestrator as the only thread-topology owner for Gil's GitHub repositories. Resolve the active repository scope from the authenticated GitHub account with gh, excluding archived repositories unless Gil names one. Create and steer repository workers directly; forbid workers from subdelegating. Rename each assigned worker as Project: short current task, monitor every five minutes, maintain ~/oss-orchestrator.md, and prepare mergeable PRs with live proof and green CI. Before asking Gil, refresh state and provide a concise decision brief with the full URL, change, proof, risks, recommendation, and exact choices; never ask with only land/delete. Release empty queues with patch by default or minor only for substantial additive features."
